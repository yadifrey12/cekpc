<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Audit Aset IT Premium - Bro System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --accent-bg: #f8fafc;
            --ind-success: #10b981;
            --ind-warning: #f59e0b;
            --ind-danger: #ef4444;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            padding: 30px 10px;
        }

        .container-custom { max-width: 1100px; margin: 0 auto; }

        .card-premium {
            background: var(--card-bg);
            border-radius: 28px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.05);
            padding: 40px;
        }

        .form-label { font-size: 0.8rem; letter-spacing: 1px; color: #64748b; margin-bottom: 8px; text-transform: uppercase; font-weight: 600; }

        .form-select, .form-control {
            border-radius: 14px;
            border: 1px solid #cbd5e1;
            background-color: var(--accent-bg);
            padding: 12px 18px;
        }

        /* TABLE STYLING */
        .table-container { border-radius: 18px; overflow: hidden; border: 1px solid #e2e8f0; background: #fff; }
        .table thead { background-color: #1e293b; color: white; }
        .table th { font-weight: 600; font-size: 0.75rem; text-transform: uppercase; padding: 18px; border: none; }
        .table td { padding: 20px 18px; border-bottom: 1px solid #f1f5f9; }

        .form-check-input { width: 1.6em; height: 1.6em; cursor: pointer; border: 2px solid #cbd5e1; }
        .form-check-input:checked { background-color: var(--primary-color); border-color: var(--primary-color); }

        .note-textarea { resize: none; overflow: hidden; min-height: 60px; border: 1px dashed #cbd5e1; background-color: #fffdec; border-radius: 12px; padding: 12px; width: 100% !important; display: block; }

        .option-box { background: var(--accent-bg); border: 1px solid #cbd5e1; border-radius: 18px; padding: 20px; }
        .persen-wrapper { border: 1px solid #cbd5e1; border-radius: 12px; background: #fff; padding: 5px 15px; width: 140px; }
        #persen { font-size: 1.1rem; font-weight: 800; border: none !important; background: transparent !important; text-align: right; width: 100%; box-shadow: none !important; }
        
        .persen-success { color: var(--ind-success) !important; }
        .persen-warning { color: var(--ind-warning) !important; }
        .persen-danger { color: var(--ind-danger) !important; }

        .btn-premium { background: var(--primary-color); color: white; border: none; padding: 18px; border-radius: 16px; font-weight: 700; font-size: 1.1rem; text-transform: uppercase; transition: 0.3s; }
        .btn-premium:hover { background: #1d4ed8; transform: translateY(-3px); }

        /* RESPONSIVE MOBILE */
        @media (max-width: 768px) {
            .card-premium { padding: 25px 15px; }
            .table, .table tbody, .table tr, .table td { display: block; width: 100%; }
            .table tr { margin-bottom: 25px; border: 1px solid #e2e8f0; border-radius: 20px; padding: 15px; background: #fff; }
            .table thead { display: none; }
            .table td { border: none; padding: 12px 0; display: flex; justify-content: space-between; align-items: center; }
            .table td:first-child { font-size: 1.2rem; font-weight: 800; color: var(--primary-color); border-bottom: 2px solid #f1f5f9; margin-bottom: 10px; display: block; text-align: left; }
            .table td:not(:first-child):not([colspan])::before { content: attr(data-label); font-weight: 700; color: #64748b; font-size: 0.85rem; }
            .row-note-mobile { display: block !important; padding: 10px 0 !important; }
            .option-box { flex-direction: column; gap: 15px; align-items: flex-start !important; }
            .persen-wrapper { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container-custom">
    <div class="card-premium shadow-sm">
        <h3 class="text-center mb-1 fw-bold">📋 Audit Aset Digital</h3>
        <p class="text-center text-muted mb-5 small">Verifikasi kondisi perangkat keras & lunak anda</p>
        
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <label class="form-label">Nama Pemakai</label>
                <select id="nama" class="form-select"></select>
            </div>
            <div class="col-md-4">
                <label class="form-label">JABATAN</label>
                <select id="jabatan" class="form-select"></select>
            </div>
            <div class="col-md-4">
                <label class="form-label">SPESIFIKASI UNIT</label>
                <select id="spek" class="form-select"></select>
            </div>
        </div>

        <div class="table-container mb-4">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th style="min-width: 160px;">Item Komponen</th>
                            <th class="text-center">BAIK</th>
                            <th class="text-center">KURANG</th>
                            <th class="text-center">RUSAK</th>
                        </tr>
                    </thead>
                    <tbody id="mainTable"></tbody>
                </table>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-6">
                <div class="option-box d-flex justify-content-between align-items-center h-100">
                    <span class="fw-bold text-muted small">AKSESORIS UNIT:</span>
                    <div class="form-check m-0">
                        <input class="form-check-input me-3" type="checkbox" id="tas">
                        <label class="form-check-label fw-bold" for="tas">Tas Laptop</label>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="option-box d-flex justify-content-between align-items-center h-100">
                    <span class="fw-bold text-muted small">KELAYAKAN (%):</span>
                    <div class="persen-wrapper">
                        <select id="persen" class="form-select"></select>
                    </div>
                </div>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold">CATATAN UMUM (OPSIONAL)</label>
            <textarea id="ket_umum" class="form-control" rows="3" placeholder="Tuliskan catatan general audit..."></textarea>
        </div>

        <div class="p-3 mb-4 bg-light rounded border-start border-4 border-primary">
            <div class="form-check d-flex align-items-center">
                <input class="form-check-input me-3" type="checkbox" id="pernyataan">
                <label class="form-check-label small fw-bold text-dark" for="pernyataan">
                    SAYA MENYATAKAN DATA DI ATAS ADALAH BENAR (TTD DIGITAL)
                </label>
            </div>
        </div>

        <button onclick="sendData()" id="btnSubmit" class="btn btn-premium w-100">Simpan Laporan Sekarang ✅</button>
    </div>
</div>

<script>
    const CONFIG = {
        nama: ["Abdul Bais Supriyadi", "Budi Setiawan", "Siti Aminah", "Raima Putri", "Andi Wijaya"],
        jabatan: ["Helper Fasilitas", "IT Support", "Admin Gudang", "Manager Operasional"],
        spek: ["Lenovo AIO 3 Core i5", "Lenovo Ideapad 5i", "Dell Optiplex 7070", "Macbook Air M1"],
        komponen: ["Hardware", "System Operasi", "Software", "Fisik"]
    };

    window.onload = () => {
        const fill = (id, list) => {
            const el = document.getElementById(id);
            el.add(new Option(`Pilih...`, ""));
            list.forEach(v => el.add(new Option(v, v)));
        };
        fill("nama", CONFIG.nama); fill("jabatan", CONFIG.jabatan); fill("spek", CONFIG.spek);
        
        const pcts = []; for(let i=100; i>=10; i-=10) pcts.push(i);
        const selectPersen = document.getElementById("persen");
        selectPersen.add(new Option(`0%`, ""));
        pcts.forEach(v => { selectPersen.add(new Option(v + "%", v)); });

        selectPersen.addEventListener('change', function() {
            const val = parseInt(this.value);
            this.classList.remove('persen-success', 'persen-warning', 'persen-danger');
            if (val >= 80) this.classList.add('persen-success');
            else if (val >= 50) this.classList.add('persen-warning');
            else if (val < 50) this.classList.add('persen-danger');
        });

        const tbody = document.getElementById("mainTable");
        CONFIG.komponen.forEach(k => {
            const id = k.toLowerCase().replace(" ", "");
            tbody.innerHTML += `
                <tr>
                    <td>${k}</td>
                    <td data-label="BAIK" class="text-center"><input class="form-check-input" type="radio" name="${id}" value="Baik" onclick="toggleNote('${id}', false)" checked></td>
                    <td data-label="KURANG" class="text-center"><input class="form-check-input" type="radio" name="${id}" value="Kurang Baik" onclick="toggleNote('${id}', true)"></td>
                    <td data-label="RUSAK" class="text-center"><input class="form-check-input" type="radio" name="${id}" value="Rusak" onclick="toggleNote('${id}', true)"></td>
                </tr>
                <tr id="row_note_${id}" class="row-note-mobile" style="display:none;">
                    <td colspan="4" style="padding: 10px 0;">
                        <textarea id="note_${id}" class="note-textarea" placeholder="Detail masalah pada ${k}..."></textarea>
                    </td>
                </tr>
            `;
        });

        document.addEventListener('input', e => { 
            if (e.target.tagName === 'TEXTAREA') { 
                e.target.style.height = 'auto'; 
                e.target.style.height = e.target.scrollHeight + 'px'; 
            } 
        });
    };

    function toggleNote(id, show) { 
        const row = document.getElementById('row_note_' + id);
        row.style.setProperty('display', show ? (window.innerWidth <= 768 ? 'block' : 'table-row') : 'none', 'important');
        if (!show) document.getElementById('note_' + id).value = ""; 
    }

    async function sendData() {
        const nama = document.getElementById('nama').value;
        const jabatan = document.getElementById('jabatan').value;
        const spek = document.getElementById('spek').value;
        const persen = document.getElementById('persen').value;
        const isAgreed = document.getElementById('pernyataan').checked;

        if (!nama || !jabatan || !spek || !persen || !isAgreed) {
            alert("⚠️ Identitas, Persentase, & Pernyataan WAJIB diisi!"); return;
        }

        const btn = document.getElementById("btnSubmit");
        btn.disabled = true;
        btn.innerText = "SEDANG MENGIRIM...";

        const payload = {
            timestamp: new Date().toLocaleString('id-ID'),
            nama: nama,
            jabatan: jabatan,
            spek: spek,
            kondisi: {
                hardware: document.querySelector('input[name="hardware"]:checked').value,
                os: document.querySelector('input[name="systemoperasi"]:checked').value,
                software: document.querySelector('input[name="software"]:checked').value,
                fisik: document.querySelector('input[name="fisik"]:checked').value
            },
            notes: {
                hw: document.getElementById('note_hardware').value || "-",
                os: document.getElementById('note_systemoperasi').value || "-",
                sw: document.getElementById('note_software').value || "-",
                fs: document.getElementById('note_fisik').value || "-"
            },
            tas: document.getElementById('tas').checked ? "Ada" : "Tidak Ada",
            persen: persen + "%",
            keterangan_umum: document.getElementById('ket_umum').value || "-"
        };

        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxfO1OrF9OVmmeulH8VXkrSbvYRpxXlGCwQFn0AD7fq0KZqfTjOIQWXJwWoUVlopTrD/exec";

        try {
            await fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(payload),
                headers: { "Content-Type": "application/json" }
            });
            
            alert("✅ BERHASIL! Data audit sudah masuk ke Google Sheets.");
            location.reload(); 
            
        } catch (err) {
            alert("❌ Gagal kirim! Cek koneksi internet lo.");
            btn.disabled = false;
            btn.innerText = "Simpan Laporan Sekarang ✅";
        }
    }
</script>
</body>
</html>
